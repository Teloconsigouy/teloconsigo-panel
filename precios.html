<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TLC Panel Control - Lista de precios</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#F0F4F0;--surface:#fff;--border:#D4DDD4;--green:#1A5C1A;--green2:#0f4f1d;
    --text:#101910;--muted:#667466;--danger:#b91c1c;--blue:#2563eb;--dark:#0f172a;
  }
  body{font-family:Inter,Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
  .top{display:flex;justify-content:space-between;align-items:center;gap:14px;padding:20px 28px;background:var(--surface);border-bottom:1px solid var(--border)}
  .brand{font-family:Syne,Inter,sans-serif;font-size:24px;color:var(--green);letter-spacing:.04em}
  .back{background:var(--green);color:#fff;text-decoration:none;border-radius:12px;padding:10px 14px;font-weight:800}
  .wrap{padding:24px}
  .bar{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;flex-wrap:wrap;margin-bottom:16px}
  h1{font-family:Syne,Inter,sans-serif;font-size:28px}
  .muted{color:var(--muted);font-size:13px;margin-top:6px}
  .actions{display:flex;gap:10px;flex-wrap:wrap}
  button,.btn{border:1px solid var(--border);background:#fff;border-radius:10px;padding:10px 14px;font-weight:800;cursor:pointer}
  .btn-green{background:var(--green);color:#fff;border-color:var(--green)}
  .btn-blue{background:var(--blue);color:#fff;border-color:var(--blue)}
  .panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:0 10px 25px rgba(15,23,42,.05)}
  .filters{display:none;padding:14px;border-bottom:1px solid var(--border);gap:10px;grid-template-columns:2fr 1fr 1fr 1fr}
  .filters.open{display:grid}
  input,select{border:1px solid var(--border);border-radius:10px;padding:10px 12px;font:inherit;background:#fff}
  table{width:100%;border-collapse:collapse;font-size:14px}
  th{background:#0f172a;color:#fff;text-align:left;padding:12px 10px;position:sticky;top:0}
  td{padding:10px;border-bottom:1px solid #e5e7eb;vertical-align:middle}
  tr:hover{background:#f8faf8}
  .table-wrap{height:calc(100vh - 230px);overflow:auto}
  .money{font-weight:800}
  .good{color:#15803d;font-weight:800}.bad{color:#b91c1c;font-weight:800}.warn{color:#c2410c;font-weight:800}
  .status{padding:14px;color:var(--muted)}
  .error{background:#fee2e2;color:#991b1b;border:1px solid #fecaca;padding:12px;border-radius:12px;margin-bottom:14px;display:none}
  .loading{padding:20px;color:var(--muted)}
  .pill{display:inline-flex;border-radius:999px;padding:4px 8px;font-size:12px;background:#eef6ee;color:var(--green);font-weight:800}
</style>
</head>
<body>
  <header class="top">
    <div>
      <div class="brand">TELOCONSIGO</div>
      <div class="muted">TLC Panel Control · Lista de precios</div>
    </div>
    <a class="back" href="/index.html">← Volver al panel</a>
  </header>

  <main class="wrap">
    <div class="bar">
      <div>
        <h1>Lista de Precios App</h1>
        <div class="muted" id="counter">Cargando productos...</div>
      </div>
      <div class="actions">
        <button onclick="toggleFilters()">▼ Filtros</button>
        <button class="btn-blue" onclick="alert('Simulador: lo dejamos para la siguiente etapa')">Simulador</button>
        <button class="btn-green" onclick="alert('Alta de producto: lo dejamos para la siguiente etapa')">Nuevo</button>
        <button onclick="loadProducts()">Actualizar</button>
      </div>
    </div>

    <div id="errorBox" class="error"></div>

    <section class="panel">
      <div class="filters" id="filters">
        <input id="searchInput" placeholder="Buscar artículo, código o proveedor..." oninput="renderProducts()">
        <select id="proveedorFilter" onchange="renderProducts()"><option value="">Todos los proveedores</option></select>
        <select id="margenFilter" onchange="renderProducts()">
          <option value="">Todos los márgenes</option>
          <option value="good">Margen bueno</option>
          <option value="warn">Margen bajo</option>
          <option value="bad">Pérdida / negativo</option>
        </select>
        <select id="estadoFilter" onchange="renderProducts()">
          <option value="">Todos</option>
          <option value="completo">Completos</option>
          <option value="incompleto">Incompletos</option>
        </select>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Artículo</th>
              <th>Código TLC</th>
              <th>Proveedor</th>
              <th>Código Proveedor</th>
              <th>Costo</th>
              <th>PVP</th>
              <th>Ganancia</th>
              <th>Margen</th>
              <th>Estado</th>
            </tr>
          </thead>
          <tbody id="productsBody">
            <tr><td colspan="9" class="loading">Cargando productos...</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

<script>
let allProducts = [];

function money(n, moneda){
  const value = Number(n || 0);
  const symbol = (moneda || 'UYU') === 'USD' ? 'USD ' : '$';
  return symbol + value.toLocaleString('es-UY', { maximumFractionDigits: 2 });
}

function pct(n){
  return Number(n || 0).toLocaleString('es-UY', { maximumFractionDigits: 2 }) + '%';
}

function escapeHtml(v){
  return String(v ?? '').replace(/[&<>"']/g, s => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[s]));
}

function marginClass(product){
  const gan = Number(product.gananciaReal || 0);
  const m = Number(product.margenReal || 0);
  if (gan < 0 || m < 0) return 'bad';
  if (m < 15) return 'warn';
  return 'good';
}

function toggleFilters(){
  document.getElementById('filters').classList.toggle('open');
}

async function apiPrices(action, payload = {}){
  const res = await fetch('/api/precios', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    credentials: 'same-origin',
    body: JSON.stringify({ action, payload })
  });

  const text = await res.text();
  let json;
  try { json = JSON.parse(text); }
  catch(e){ throw new Error('Respuesta inválida: ' + text.slice(0,250)); }

  if (!res.ok || json.ok === false) {
    throw new Error(json.message || json.error || 'Error al cargar lista de precios');
  }

  return Object.prototype.hasOwnProperty.call(json, 'data') ? json.data : json;
}

async function loadProducts(){
  const errorBox = document.getElementById('errorBox');
  const tbody = document.getElementById('productsBody');
  errorBox.style.display = 'none';
  tbody.innerHTML = '<tr><td colspan="9" class="loading">Cargando productos desde Google Sheets...</td></tr>';
  document.getElementById('counter').textContent = 'Cargando productos...';

  try {
    const data = await apiPrices('getProducts');
    allProducts = Array.isArray(data) ? data : [];
    populateProveedorFilter();
    renderProducts();
  } catch (err) {
    console.error(err);
    errorBox.textContent = err.message || String(err);
    errorBox.style.display = 'block';
    tbody.innerHTML = '<tr><td colspan="9" class="loading">No se pudieron cargar los productos.</td></tr>';
    document.getElementById('counter').textContent = 'Mostrando 0 de 0 artículos';
  }
}

function populateProveedorFilter(){
  const select = document.getElementById('proveedorFilter');
  const current = select.value;
  const proveedores = [...new Set(allProducts.map(p => p.proveedor).filter(Boolean))].sort();
  select.innerHTML = '<option value="">Todos los proveedores</option>' + proveedores.map(p => `<option value="${escapeHtml(p)}">${escapeHtml(p)}</option>`).join('');
  select.value = proveedores.includes(current) ? current : '';
}

function getFiltered(){
  const s = document.getElementById('searchInput').value.toLowerCase().trim();
  const proveedor = document.getElementById('proveedorFilter').value;
  const margen = document.getElementById('margenFilter').value;
  const estado = document.getElementById('estadoFilter').value;

  return allProducts.filter(p => {
    const text = [p.articulo,p.codigoTLC,p.proveedor,p.codigoProveedor,p.codigoFabrica].join(' ').toLowerCase();
    if (s && !text.includes(s)) return false;
    if (proveedor && p.proveedor !== proveedor) return false;
    if (estado === 'completo' && p.incompleto) return false;
    if (estado === 'incompleto' && !p.incompleto) return false;
    if (margen && marginClass(p) !== margen) return false;
    return true;
  });
}

function renderProducts(){
  const tbody = document.getElementById('productsBody');
  const items = getFiltered();
  document.getElementById('counter').textContent = `Mostrando ${items.length} de ${allProducts.length} artículos`;

  if (!items.length) {
    tbody.innerHTML = '<tr><td colspan="9" class="loading">No hay productos para mostrar.</td></tr>';
    return;
  }

  tbody.innerHTML = items.map(p => {
    const cls = marginClass(p);
    return `<tr>
      <td><strong>${escapeHtml(p.articulo)}</strong><br><span class="muted">${escapeHtml(p.codigoFabrica || '')}</span></td>
      <td>${escapeHtml(p.codigoTLC)}</td>
      <td>${escapeHtml(p.proveedor)}</td>
      <td>${escapeHtml(p.codigoProveedor)}</td>
      <td class="money">${money(p.precioProveedor, p.moneda)}</td>
      <td class="money">${money(p.pvp, p.moneda)}</td>
      <td class="${cls}">${money(p.gananciaReal, p.moneda)}</td>
      <td class="${cls}">${pct(p.margenReal)}</td>
      <td>${p.incompleto ? '<span class="pill" style="background:#fff7ed;color:#c2410c">Incompleto</span>' : '<span class="pill">Completo</span>'}</td>
    </tr>`;
  }).join('');
}

document.addEventListener('DOMContentLoaded', loadProducts);
</script>
</body>
</html>
