<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iniciar sesión — TELOCONSIGO + TOP SHOP</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F0F4F0; --surface:#FFFFFF;
  --border:#D4DDD4; --border2:#B8C8B8;
  --green:#1A5C1A; --green-mid:#2E7D2E;
  --green-light:rgba(26,92,26,0.08);
  --text:#0E1A0E; --muted:#5C7060; --muted2:#9CB09C;
  --red:#DC2626; --red-bg:rgba(220,38,38,0.06);
  --pos:#15803D; --pos-bg:rgba(21,128,61,0.08);
}
html,body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;height:100vh;display:flex;align-items:center;justify-content:center;}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:40px;width:380px;max-width:92vw;box-shadow:0 8px 24px rgba(0,0,0,0.04);}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.6rem;letter-spacing:-0.04em;color:var(--green);text-transform:uppercase;text-align:center;margin-bottom:6px;}
.subtitle{font-size:13px;color:var(--muted);text-align:center;margin-bottom:30px;}
.lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted2);margin-bottom:7px;display:block;}
.inp{width:100%;background:#F5F8F5;border:1.5px solid var(--border);border-radius:6px;padding:11px 14px;font-family:'Inter',sans-serif;font-size:14px;outline:none;margin-bottom:16px;transition:border-color 0.15s;}
.inp:focus{border-color:var(--green);background:#fff;}
.btn{width:100%;background:var(--green);color:#fff;border:none;border-radius:6px;padding:12px;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;cursor:pointer;transition:background 0.15s;}
.btn:hover{background:var(--green-mid);}
.btn:disabled{opacity:0.5;cursor:not-allowed;}
.error{background:var(--red-bg);color:var(--red);border:1px solid rgba(220,38,38,0.2);border-radius:5px;padding:10px 14px;font-size:13px;margin-bottom:16px;display:none;}
.error.show{display:block;}
.hint{margin-top:18px;font-size:12px;color:var(--muted);text-align:center;line-height:1.6;}
.hint strong{color:var(--text);}

.modal-overlay{display:none;position:fixed;inset:0;z-index:100;background:rgba(10,20,10,0.5);align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
</style>
</head>
<body>
  <div class="login-box" id="login-form">
    <div class="logo">Teloconsigo</div>
    <div class="subtitle">Panel de Control · MeLi ADS</div>

    <div class="error" id="err"></div>

    <label class="lbl">Usuario</label>
    <input type="text" class="inp" id="username" autocomplete="username" autofocus>

    <label class="lbl">Contraseña</label>
    <input type="password" class="inp" id="password" autocomplete="current-password">

    <button class="btn" id="submit-btn" onclick="doLogin()">Ingresar →</button>

    <div class="hint">
      ¿Olvidaste tu contraseña?<br>
      Pedile al <strong>administrador</strong> que la resetee.
    </div>
  </div>

  <!-- Modal de cambio obligatorio -->
  <div class="modal-overlay" id="must-change">
    <div class="login-box" style="width:420px">
      <div class="logo">Cambiar contraseña</div>
      <div class="subtitle">Por seguridad, cambiá tu contraseña antes de continuar.</div>

      <div class="error" id="err2"></div>

      <label class="lbl">Contraseña actual</label>
      <input type="password" class="inp" id="cur-pw">

      <label class="lbl">Nueva contraseña (mín. 6 caracteres)</label>
      <input type="password" class="inp" id="new-pw">

      <label class="lbl">Confirmar nueva contraseña</label>
      <input type="password" class="inp" id="new-pw2">

      <button class="btn" id="change-btn" onclick="doChange()">Cambiar y continuar →</button>
    </div>
  </div>

<script>
function showErr(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.classList.add('show');
}
function hideErr(id) {
  document.getElementById(id).classList.remove('show');
}

async function doLogin() {
  hideErr('err');
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  if (!username || !password) {
    showErr('err', 'Completá usuario y contraseña');
    return;
  }
  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = 'Ingresando...';
  try {
    const r = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });
    const data = await r.json();
    if (!r.ok) {
      showErr('err', data.error || 'Error');
      btn.disabled = false;
      btn.textContent = 'Ingresar →';
      return;
    }
    if (data.user && data.user.mustChange) {
      // Mostrar modal de cambio obligatorio
      document.getElementById('cur-pw').value = password;
      document.getElementById('must-change').classList.add('open');
      document.getElementById('new-pw').focus();
    } else {
      window.location.href = '/index.html';
    }
  } catch (e) {
    showErr('err', 'Error de conexión: ' + e.message);
    btn.disabled = false;
    btn.textContent = 'Ingresar →';
  }
}

async function doChange() {
  hideErr('err2');
  const currentPassword = document.getElementById('cur-pw').value;
  const newPassword = document.getElementById('new-pw').value;
  const newPassword2 = document.getElementById('new-pw2').value;
  if (newPassword !== newPassword2) {
    showErr('err2', 'Las contraseñas no coinciden');
    return;
  }
  if (newPassword.length < 6) {
    showErr('err2', 'Mínimo 6 caracteres');
    return;
  }
  const btn = document.getElementById('change-btn');
  btn.disabled = true;
  btn.textContent = 'Cambiando...';
  try {
    const r = await fetch('/api/change-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ currentPassword, newPassword }),
    });
    const data = await r.json();
    if (!r.ok) {
      showErr('err2', data.error || 'Error');
      btn.disabled = false;
      btn.textContent = 'Cambiar y continuar →';
      return;
    }
    window.location.href = '/index.html';
  } catch (e) {
    showErr('err2', 'Error: ' + e.message);
    btn.disabled = false;
    btn.textContent = 'Cambiar y continuar →';
  }
}

// Enter para login
document.getElementById('password').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});
document.getElementById('username').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('password').focus();
});
document.getElementById('new-pw2').addEventListener('keydown', e => {
  if (e.key === 'Enter') doChange();
});
</script>
</body>
</html>
